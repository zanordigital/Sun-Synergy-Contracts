faqs:
  - question: How much does a home renovation cost in Malaysia?
    answer: "Home renovation costs in Malaysia vary widely based on scope. A basic condo renovation (paint, flooring, basic carpentry) typically starts from RM30,000. A full terrace house renovation including extensions and full fit-out ranges from RM80,000 to RM180,000. Full bungalow renovations can exceed RM300,000. We provide a detailed itemised quotation after a free site visit."
  - question: How long does a home renovation take?
    answer: "Timeline depends on scope. A condo interior renovation typically takes 1-3 months. A terrace house full renovation is usually 3-6 months. Projects involving structural extensions or larger bungalows may take 6-12 months. We provide a fixed timeline in writing before any work begins."
  - question: Are you licensed to carry out renovation works?
    answer: "Yes. Sun Synergy Contracts holds a CIDB G4 contractor licence, which authorises us to carry out building and renovation works. All our workers are registered and our projects carry appropriate insurance coverage."
