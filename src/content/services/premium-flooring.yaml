description: We supply and install premium flooring for residential and commercial spaces across Klang Valley. Our range covers SPC (stone polymer composite) planks, luxury vinyl planks, ceramic and porcelain tiles in all formats, and all associated skirting, profiles, and transitions. Every installation is completed by our own crew - no subcontractors.
