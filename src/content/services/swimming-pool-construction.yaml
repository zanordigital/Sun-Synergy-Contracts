problems:
  - Contractors who build pools without proper structural engineering, leading to cracks or leaks within 2-3 years
  - No single contractor managing civil works, filtration, and finishing - causing coordination failures
  - Missing local authority submissions that create legal problems when selling the property
  - Poor waterproofing that requires expensive remediation shortly after construction
processSteps:
  - title: Site Assessment & Design
    detail: We assess your land, soil conditions, and access before designing a pool that fits your space, usage, and budget.
  - title: Structural Engineering & Permits
    detail: We commission a licensed structural engineer's report and manage all local authority permit applications on your behalf.
  - title: Civil & Structural Construction
    detail: Foundation, reinforced concrete shell, and backfill are constructed to engineering specification with proper supervision.
  - title: Waterproofing & Tiling
    detail: Multiple layers of waterproofing membrane are applied before tiling, ensuring a watertight shell that will last decades.
  - title: Filtration, Electrics & Commissioning
    detail: Pump, filter, sanitisation system, and pool lighting are installed and commissioned before the final water fill and handover.
faqs:
  - question: Do I need a permit to build a swimming pool in Malaysia?
    answer: "Yes. Swimming pool construction in Malaysia requires a building plan submission and approval from your local authority (e.g. MBPJ for Petaling Jaya, MPSJ for Subang Jaya). A licensed structural engineer's drawings are also required. We manage all submissions and approvals as part of our project scope."
  - question: How long does it take to build a swimming pool?
    answer: "From permit approval to water fill, a typical residential swimming pool takes 3-5 months. This includes 4-6 weeks for structural works, 2-3 weeks for waterproofing and tiling, and 1-2 weeks for filtration and commissioning. Permit approval timeframes from local authorities vary and are outside our control."
  - question: What type of pool finish do you offer?
    answer: "We offer ceramic tile, porcelain tile, glass mosaic, and Pebblecrete finishes. Pool surround options include natural stone, porcelain tile, and timber decking. We will advise on the most suitable finish based on your design aesthetic and maintenance preferences."
