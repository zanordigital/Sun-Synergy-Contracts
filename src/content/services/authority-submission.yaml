title: Authority Submission & Permits
h1: Renovation Permit & Authority Submission in Malaysia
metaTitle: Renovation Permit Malaysia | Authority Submission
metaDescription: We manage renovation permits and authority submissions for extension works and office renovations in Malaysia. CIDB G4 contractor. Enquire now.
heroSubhead: We handle the paperwork. Building extension approvals, office renovation permits, and authority submissions managed end-to-end.
primaryKeyword: renovation permit Malaysia
description: "Many renovation works - particularly structural extensions, changes to load-bearing elements, or office fit-outs regulated by local councils - require formal authority submission and permit approval before works can begin. Sun Synergy Contracts manages the full submission process - plan preparation, authority liaison, approval tracking, and permit acquisition - coordinated alongside the physical renovation works."
priceFromMYR: 3000
priceCeilingMYR: 15000
problems:
  - Contractors who begin extension work without the required building plan approval, leaving the owner liable for enforcement
  - Office renovations that violate local authority or DOSH requirements, resulting in stop-work orders
  - Submission paperwork that stalls because the contractor does not understand the local council process
  - Completed extensions that cannot be insured or refinanced because they lack approved plans on record
processSteps:
  - title: Scope Assessment
    detail: We assess the proposed works to confirm which authority submissions or permits are required - local council (MBPJ, DBKL, MBSJ), DOSH, or other regulatory bodies.
  - title: Plan Preparation
    detail: Our team prepares the required drawings, specifications, and supporting documentation for submission. Where a licensed architect or engineer is required by law, we coordinate that engagement.
  - title: Authority Submission
    detail: We lodge the complete submission with the relevant authority and track its progress, following up proactively to avoid unnecessary delays.
  - title: Approval and Permit Issuance
    detail: Upon approval, we obtain the permit and provide certified copies of all approved plans and correspondence for your records.
  - title: Commencement of Works
    detail: With permits in hand, physical renovation or construction works proceed under CIDB G4 licence - with all approvals documented and filed.
faqs:
  - question: When is a building plan approval required for home extension works?
    answer: "Extension works involving structural changes, new rooms, covered areas, or increases to built-up area generally require local council approval before works begin. The specific threshold varies by local authority (MBPJ, MBSJ, DBKL). We assess your proposed scope and confirm exactly what is required before any work starts."
  - question: Do office renovations require a permit in Malaysia?
    answer: "Office renovation works involving changes to fire escape routes, structural elements, electrical system upgrades, or the building facade generally require notification to or approval from BOMBA, the local council, or DOSH. We handle the permit and submission process alongside the physical renovation works."
  - question: Can you manage authority submissions for works already completed without approval?
    answer: "Yes, though this is more complex and potentially more costly than submitting before works begin. We can assess the completed works, prepare the required retrospective submissions, and advise on the path to regularisation. Contact us to discuss your specific situation."
