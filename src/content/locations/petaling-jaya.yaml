faqs:
  - question: Are you based in Petaling Jaya?
    answer: "Yes. Our office and workshop are located at 17C, Jalan PJS 1/33, Taman Petaling Utama, 46150 Petaling Jaya. We serve all PJ areas and the broader Klang Valley."
  - question: Which areas of Petaling Jaya do you cover?
    answer: "We cover all of Petaling Jaya including SS1-SS26, Damansara, Kelana Jaya, Taman Megah, Tropicana, Kota Damansara, Bandar Utama, Ara Damansara, and all surrounding neighbourhoods."
  - question: How quickly can you visit my property in Petaling Jaya for a consultation?
    answer: "As we are based in PJ, we can typically schedule a site visit within 2-3 business days of your enquiry. Contact us via WhatsApp or phone for the fastest response."
