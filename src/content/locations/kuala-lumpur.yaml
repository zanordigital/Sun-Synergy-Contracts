faqs:
  - question: Do you take on projects in Kuala Lumpur?
    answer: "Yes. We regularly work in Kuala Lumpur across both commercial and residential sectors. Past KL projects include a Mercedes-Benz showroom fit-out, the KLIA Control Tower facilities renovation, and multiple retail fit-outs in the city."
  - question: Can you handle KL city centre commercial renovations?
    answer: "Yes. We are experienced working in active commercial buildings, high-rise office environments, and retail malls in KL city centre. We plan all works to minimise business disruption and comply with building management requirements."
  - question: How do you handle parking and access for KL projects?
    answer: "We coordinate with building management for contractor access, lorry bays, and material lift schedules well in advance. Our site manager handles all logistics so you do not need to be involved in the day-to-day coordination."
  - question: Do you offer interior design in Kuala Lumpur as well as renovation?
    answer: "Yes. We provide full interior design in Kuala Lumpur, covering concept development, space planning, material selection, 3D visualisation, and design-and-build execution under one contract. Catherine Ng, our Design Director, leads every KL design brief personally, whether it is a KLCC condominium, a Mont Kiara family home, or a commercial space in the city."
