h1: Renovation Contractor in Kuala Lumpur
heroSubhead: Commercial fit-outs and residential renovations across Kuala Lumpur, delivered on time and to the standard your location demands.
description: We have delivered commercial and residential renovation projects across Kuala Lumpur including KLCC, Mont Kiara, Bangsar, Chow Kit, and KLIA. Our KL projects include branded commercial fit-outs (Mercedes-Benz showroom), government facility upgrades (KLIA Control Tower), and retail design and build work. Alongside renovation, we provide full residential interior design in Kuala Lumpur, from concept and 3D visualisation through to design-and-build delivery for condominiums and landed homes in KLCC, Mont Kiara, and Bangsar, led personally by our Design Director Catherine Ng.
