body: "This corner terrace unit in USJ 17 underwent one of the most comprehensive residential transformations in our portfolio. The project began with structural demolition and roof works to extend the home's footprint, followed by a brand-new kitchen layout with custom cabinetry, a porch expansion, and garden landscaping. Every bathroom was fully stripped and rebuilt, the entire house was retiled from floor to ceiling, and the electrical system was rewired throughout. The result is a home that looks and feels completely rebuilt, delivered over twelve months with a single team managing every trade."
