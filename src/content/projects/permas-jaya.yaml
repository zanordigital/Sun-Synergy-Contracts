metaTitle: "Showroom Unit Design & Build, Johor"
body: "The Permas Jaya project is the only showroom unit Sun Synergy Contracts has delivered outside the Klang Valley, built for a client in Johor Bahru. The scope covered a complete design and build of the unit from concept through to handover, including full furnishing works, M&E electrical works, and custom built-in furniture designed and fabricated to fit each room. Partition, ceiling, and painting works completed the interior fit-out. Every room, from the kitchen and living areas through to the bedrooms and study, was finished to the same design-and-build standard the company applies across its Klang Valley projects, delivered in two months from start to handover."
