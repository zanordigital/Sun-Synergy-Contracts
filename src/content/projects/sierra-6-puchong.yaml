body: "The Sierra 6 project centred on elevating the interior of a Puchong condominium with high-quality carpentry and finish work. Custom kitchen cabinetry was designed and installed, bedroom built-ins were fabricated to specification, a feature wall added design interest to the main bedroom, a back awning with feature tiling extended the usable space, and metal grille work was fabricated and fitted throughout. All electrical and wiring works were completed in parallel, with the entire project handed over within a single month."
