metaTitle: "Condo Renovation, Old Klang Road KL"
body: "The Sri Murni condominium along Old Klang Road, Kuala Lumpur, was fully refurbished on a tight 30 day timeline. All bathrooms were refurbished, and both the wet and dry kitchens were rebuilt with new plumbing and wet works throughout. Full M&E wiring and AC and mechanical works were completed alongside full tiling and SPC flooring installation. Built-in furniture was fabricated and fitted, and curtains and window tinting completed the finish. The compressed schedule required close coordination across every trade to hand the unit over on time."
