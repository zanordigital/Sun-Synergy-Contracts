metaTitle: "Commercial Fit-Out, PJ - Montessori"
body: "The Montessori C180 project required combining two side-by-side office units into one cohesive, child-friendly learning space. Partition walls were reconfigured to create an open-plan layout, new vinyl flooring was installed throughout, plaster ceilings were fitted, and electrical points were repositioned to suit the new interior arrangement. Internal partitions were built to delineate activity zones while keeping the space feeling open. From first site visit to handover, the entire project was delivered in six weeks, allowing the centre to open on schedule."
