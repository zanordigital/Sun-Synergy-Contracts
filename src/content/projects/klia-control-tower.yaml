body: "Renovation work at the KLIA Control Tower required the precision and reliability expected of a government aviation facility. The project covered full toilet refurbishment with new tiling and sanitaryware, restroom flooring and ceiling works, kitchen pantry construction, and the supply and installation of loose furniture throughout the staff areas. Completed over six months, every element was delivered to the exacting specifications and quality control standards required by the client."
