metaTitle: "Office Fit-Out, PJ Midtown"
body: "The PJ Midtown Office project delivered a full 1,900 sq ft office fit-out for a technology and engineering company. Scope included full partitioning with fixed windows and doors, suspended ceiling works, and a Bomba compliant water sprinkler system installation to meet fire safety requirements. Complete M&E wiring was carried out alongside CCTV and door access security system installation and AC supply and installation. Epoxy cement flooring was laid throughout, and built-in carpentry was fabricated for the pantry area. All submission and permit approval works were managed as part of the engagement, with the project handed over within one month."
