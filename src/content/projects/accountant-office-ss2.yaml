body: "This 1,650 sq ft accounting office in SS2, Petaling Jaya, required reinstating and combining two adjoining shoplots into a single functional workspace, including moving an existing facility during the transition. Full carpentry built-in works were fabricated for workstations and storage, and a longstanding leaking issue was rectified as part of the refurbishment. Complete M&E wiring, CCTV security system installation, and AC supply and installation were carried out throughout, along with internal carpet works and office workstation supply. All submission and permit approval works were handled to close out the project in six weeks."
