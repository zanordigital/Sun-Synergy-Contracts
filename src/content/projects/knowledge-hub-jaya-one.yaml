metaTitle: "Training Centre Fit-Out, Jaya One PJ"
body: "The Knowledge Hub project involved fitting out a training centre within Jaya One, Petaling Jaya, for a corporate training provider. The 1,500 sq ft space was fully renovated with new partitioning, glass, and door installations to create distinct training areas, alongside a complete M&E rewiring, AC supply, and CCTV and door access security system installation. A custom-built functional pantry was fabricated in carpentry, and feature stickers and signage were added throughout. All authority submission and permit approval works were handled as part of the scope. The entire fit-out, from renovation to final signage, was completed within one month."
