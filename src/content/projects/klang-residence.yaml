metaTitle: "Full Home Renovation, Klang"
body: "The Klang Residence project was a full whole-home transformation of a semi-detached house in Taman Gembira, Klang. The scope began with permit and renovation submission works, followed by full demolition and a side pergola extension to expand the usable footprint. A new wet and dry kitchen was built alongside a complete M&E and wiring upgrade, and every toilet in the house was refurbished. New flooring was laid throughout the house and car porch, custom carpentry built-ins were fitted room by room, and plaster ceilings were installed. The facade was re-designed and the whole house repainted to complete the transformation. Delivered over one year, the finished home left the client's family and visitors impressed with the result."
